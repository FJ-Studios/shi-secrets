# ─── Woodpecker CI — shi-secrets kagami e2e ship-gate ────────────────────────
# Non-vault e2e scope: runs on every PR + push to main/develop.
# Vault-live scope: operator-machine only via scripts/beta-vault-live.sh.
# Part of Master Spec §1.4 — shi-secrets-hanko-beta cluster.

when:
  event: [pull_request, push]
  branch: [main, develop, "feat/*", "fix/*"]

steps:
  - name: kagami-e2e-no-vault
    image: shikki/kagami-runner:latest
    commands:
      - kagami test --strict --scope e2e-brokerd-no-vault
    when:
      event: [pull_request, push]
      branch: [main, develop]
